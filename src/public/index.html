<body class="bg-white-snow">
	<header id="menu">
		<nav class="relative border-b border-black p-4">
			<div class="flex justify-center">
				<div id="nav-list" class="space-x-8">
					<a href="/" class="font-rubik text-sm link-hovered font-semibold text-slate-gray">HOME</a>

					<span class="flex justify-center md:justify-normal pb-1 space-x-4">
						<button><i id="play-button" class="fa-regular fa-circle-play fa-xl"></i></button>
						<span class="flex flex-row gap-1">
							<h2 id="song-title" class="font-rubik text-[#00214d] text-md"> </h2>
							<p class="font-rubik text-[#00214d] text-md"> by </p>
							<a id="song-artist" href="https://www.youtube.com/@HOYOMIX"class="text-slate-gray font-semibold"> </a>
						</span>
					</span>
					<span class="hidden md:flex flex-col gap-4">

					</span>
				</span>
			</div>
			<div class="mt-2 md:mt-0 basis-2/4">
				<span>
					<span class="aspect-square">
						<img src="images/background-main.png" alt="TIona">
					</span>
				</span>
			</div>
			<div class="basis-1/4 space-y-5">
				<h2 class="font-spectral text-center md:text-right text-[#00214d] text-5xl">TAPI APAKAH ITU BENAR-BENAR TERJADI?</h2>
				<div class="flex items-center justify-between space-x-4 w-full">
					<p id="current-time">00.00</p>
					<div id="progress-bar-container" class="relative w-full h-1.5 bg-mauve-taupe rounded-full">
						<div id="progress-bar" class="absolute top-0 left-0 w-0 h-full bg-indigo-600 rounded-full"></div>
					</div>
					<p id="duration">00.00</p>
				</div>
				<span class="hidden md:flex flex-col gap-4">
					<p class="link-hovered text-right"><a href="about.html" class="font-rubik text-lg font-semibold text-slate-gray">ABOUT</a></p>
					<p class="link-hovered text-right"><a href="project.html" class="font-rubik text-right text-lg font-semibold text-slate-gray">PROJECT</a></p>
